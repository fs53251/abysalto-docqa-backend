services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: abysalto-api:latest
    restart: unless-stopped
    environment:
      ENV: "${ENV:-dev}"
      APP_NAME: "${APP_NAME:-Abysalto Document QA}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FORMAT: "${LOG_FORMAT:-text}"
      LOG_JSON_INCLUDE_EXC_INFO: "${LOG_JSON_INCLUDE_EXC_INFO:-false}"

      DATA_DIR: "/app/data"
      UPLOAD_ROOT: "/app/data/uploads"
      CACHE_ROOT: "/app/data/cache"

      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://docqa:docqa@db:5432/docqa}"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379/0}"

      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      JWT_ALGORITHM: "${JWT_ALGORITHM:-HS256}"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}"
      PASSWORD_MIN_LENGTH: "${PASSWORD_MIN_LENGTH:-8}"

      SESSION_COOKIE_NAME: "${SESSION_COOKIE_NAME:-docqa_session}"
      SESSION_COOKIE_SECRET: "${SESSION_COOKIE_SECRET:?Set SESSION_COOKIE_SECRET in .env}"
      SESSION_COOKIE_SECURE: "${SESSION_COOKIE_SECURE:-true}"
      SESSION_COOKIE_SAMESITE: "${SESSION_COOKIE_SAMESITE:-lax}"
      SESSION_COOKIE_MAX_AGE_SECONDS: "${SESSION_COOKIE_MAX_AGE_SECONDS:-604800}"

      QA_USE_OPENAI: "${QA_USE_OPENAI:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      QA_MODEL_NAME: "${QA_MODEL_NAME:-gpt-4o-mini}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_ORGANIZATION: "${OPENAI_ORGANIZATION:-}"
      OPENAI_TIMEOUT_SECONDS: "${OPENAI_TIMEOUT_SECONDS:-60}"
      OPENAI_MAX_OUTPUT_TOKENS: "${OPENAI_MAX_OUTPUT_TOKENS:-350}"

      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HOME: "/cache/huggingface"
      TRANSFORMERS_CACHE: "/cache/huggingface/transformers"
      SENTENCE_TRANSFORMERS_HOME: "/cache/sentence-transformers"
      TORCH_HOME: "/cache/torch"
      EASYOCR_MODULE_PATH: "/cache/easyocr"

      PRELOAD_MODELS_ON_STARTUP: "${PRELOAD_MODELS_ON_STARTUP:-false}"
      RUN_MIGRATIONS: "${RUN_MIGRATIONS:-true}"
      WAIT_FOR_DEPENDENCIES_TIMEOUT: "${WAIT_FOR_DEPENDENCIES_TIMEOUT:-90}"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "8000:8000"

    volumes:
      - uploads_data:/app/data/uploads
      - processed_data:/app/data/processed
      - app_cache:/app/data/cache
      - hf_cache:/cache

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,sys,urllib.request; resp=urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=5); data=json.load(resp); sys.exit(0 if data.get('ready') else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    image: abysalto-ui:latest
    restart: unless-stopped
    environment:
      STREAMLIT_API_BASE_URL: "${STREAMLIT_API_BASE_URL:-http://api:8000}"
      STREAMLIT_REQUEST_TIMEOUT_SEC: "${STREAMLIT_REQUEST_TIMEOUT_SEC:-60}"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys,urllib.request; resp=urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5); sys.exit(0 if resp.status == 200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-docqa}"
      POSTGRES_USER: "${POSTGRES_USER:-docqa}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-docqa} -d ${POSTGRES_DB:-docqa}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  uploads_data:
  processed_data:
  app_cache:
  hf_cache:
  db_data:
